server.port=${PORT:8080}
# Game tick period in milliseconds (125ms = 8 ticks/second)
territorial.tickMs=125

# --- Database (Postgres). All overridable by environment in production. ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/territorial}
spring.datasource.username=${DB_USER:territorial}
spring.datasource.password=${DB_PASSWORD:territorial}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Auth (JWT). MUST be overridden in production via JWT_SECRET (>= 32 bytes). ---
territorial.jwt.secret=${JWT_SECRET:dev-only-secret-change-me-please-0123456789abcdef}
territorial.jwt.ttl-hours=${JWT_TTL_HOURS:168}

# Don't leak internals in error responses.
server.error.include-message=never
server.error.include-stacktrace=never
